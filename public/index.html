<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>George AI</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-alt: #1e1e1e;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --user-bubble: #2563eb;
      --error-bg: #3b1010;
      --error-border: #7f1d1d;
      --error-text: #fca5a5;
      --danger: #f87171;
      --danger-hover: #7f1d1d;
    }

    [data-theme="light"] {
      --bg: #f9f9f9;
      --surface: #ffffff;
      --surface-alt: #f0f0f0;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: #666;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --user-bubble: #2563eb;
      --error-bg: #fee2e2;
      --error-border: #fca5a5;
      --error-text: #991b1b;
      --danger: #dc2626;
      --danger-hover: #fee2e2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-title { font-size: 18px; font-weight: 600; flex: 1; }
    .header-user { font-size: 13px; color: var(--text-muted); }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); }
    .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #end-session-btn { border-color: var(--error-border); color: var(--danger); }
    #end-session-btn:hover:not(:disabled) { background: var(--error-bg); }

    /* ── Chat window ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 720px;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user { align-self: flex-end; background: var(--user-bubble); color: #fff; }
    .assistant { align-self: flex-start; background: var(--surface-alt); border: 1px solid var(--border); }
    .error { align-self: flex-start; background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .message img { max-width: 240px; border-radius: 8px; display: block; margin-bottom: 6px; }

    /* ── Input area ── */
    #input-area {
      padding: 12px 20px 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #image-preview-wrap {
      display: none;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }
    #image-preview-wrap img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
    #clear-image {
      background: var(--error-bg);
      border: none;
      color: var(--danger);
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: center;
    }
    #clear-image:hover { background: var(--danger-hover); }
    .input-row { display: flex; gap: 10px; }
    #input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    #input:focus { border-color: var(--accent); }
    #send {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }
    #send:hover { background: var(--accent-hover); }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Modals / overlays ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal h2 { font-size: 20px; font-weight: 600; }
    .modal p { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
    .modal input, .modal select {
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      width: 100%;
      outline: none;
      font-family: inherit;
    }
    .modal input:focus, .modal select:focus { border-color: var(--accent); }
    .modal label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-primary {
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      padding: 10px 16px;
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-secondary:hover { background: var(--border); color: var(--text); }

    /* Settings panel */
    #settings-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 50;
      transform: translateX(100%);
      transition: transform 0.2s ease;
    }
    #settings-panel.open { transform: translateX(0); }
    #settings-panel h3 { font-size: 16px; font-weight: 600; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; color: var(--text-muted); }
    .field input, .field select {
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .settings-footer { margin-top: auto; display: flex; gap: 10px; }
  </style>
</head>
<body>

  <!-- Username modal -->
  <div class="overlay" id="username-overlay">
    <div class="modal">
      <h2>Welcome to George AI</h2>
      <p>Enter a username to get started. George will remember your conversations between sessions.</p>
      <div>
        <label>Username</label>
        <input type="text" id="username-input" placeholder="e.g. jay" autocomplete="off" />
      </div>
      <div class="modal-actions">
        <button class="btn-primary" id="username-confirm">Start Chatting</button>
      </div>
    </div>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel">
    <h3>Settings</h3>
    <div class="field">
      <label>Provider</label>
      <select id="settings-provider">
        <option value="groq">Groq (free)</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="openai">OpenAI</option>
      </select>
    </div>
    <div class="field" id="settings-apikey-field">
      <label>API Key <span style="color: var(--text-muted); font-size: 11px">(stored in browser only)</span></label>
      <input type="password" id="settings-apikey" placeholder="Leave empty to use server key" />
    </div>
    <div class="field">
      <label>Model</label>
      <select id="settings-model"></select>
    </div>
    <div class="field">
      <label>Font Size</label>
      <select id="settings-fontsize">
        <option value="small">Small</option>
        <option value="medium">Medium</option>
        <option value="large">Large</option>
      </select>
    </div>
    <div class="field">
      <label>Theme</label>
      <select id="settings-theme">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </div>
    <div class="settings-footer">
      <button class="btn-primary" id="settings-save">Save</button>
      <button class="btn-secondary" id="settings-close">Cancel</button>
    </div>
  </div>

  <!-- Header -->
  <header>
    <span class="header-title">George AI</span>
    <span class="header-user" id="header-username"></span>
    <button class="icon-btn" id="end-session-btn" disabled>End Session</button>
    <button class="icon-btn" id="settings-btn">⚙ Settings</button>
  </header>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Input area -->
  <div id="input-area">
    <div id="image-preview-wrap">
      <img id="image-preview" src="" alt="pasted image" />
      <button id="clear-image" title="Remove image">×</button>
    </div>
    <div class="input-row">
      <textarea id="input" rows="2" placeholder="Message George..."></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    // ── Constants ──
    const MODELS = {
      groq: ['llama-3.3-70b-versatile', 'llama-3.2-90b-vision-preview', 'llama-3.1-8b-instant'],
      anthropic: ['claude-sonnet-4-6', 'claude-haiku-4-5-20251001', 'claude-opus-4-7'],
      openai: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo'],
    };
    const DEFAULT_MODELS = { groq: 'llama-3.3-70b-versatile', anthropic: 'claude-sonnet-4-6', openai: 'gpt-4o' };
    const FONT_SIZES = { small: '13px', medium: '15px', large: '18px' };

    // ── State ──
    let username = null;
    let userData = { summary: '', currentSession: [] };
    let settings = { provider: 'groq', apiKey: '', model: 'llama-3.3-70b-versatile', fontSize: 'medium', theme: 'dark' };
    let pastedImage = null;
    let sessionHasMessages = false;

    // ── DOM ──
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const endSessionBtn = document.getElementById('end-session-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const usernameOverlay = document.getElementById('username-overlay');
    const usernameInput = document.getElementById('username-input');
    const imagePreviewWrap = document.getElementById('image-preview-wrap');
    const imagePreview = document.getElementById('image-preview');

    // ── Apply settings to DOM ──
    function applySettings(s) {
      document.documentElement.setAttribute('data-theme', s.theme || 'dark');
      const size = FONT_SIZES[s.fontSize] || '15px';
      document.querySelectorAll('.message, #input, .icon-btn, .field label').forEach(el => {
        el.style.fontSize = size;
      });
    }

    // ── localStorage helpers ──
    function saveUserData() {
      localStorage.setItem(`george-ai-user-${username}`, JSON.stringify(userData));
    }
    function loadUserData(name) {
      const raw = localStorage.getItem(`george-ai-user-${name}`);
      return raw ? JSON.parse(raw) : { summary: '', currentSession: [] };
    }
    function saveSettings() {
      localStorage.setItem('george-ai-settings', JSON.stringify(settings));
    }
    function loadSettings() {
      const raw = localStorage.getItem('george-ai-settings');
      return raw ? JSON.parse(raw) : { provider: 'groq', apiKey: '', model: 'llama-3.3-70b-versatile', fontSize: 'medium', theme: 'dark' };
    }

    // ── Username flow ──
    function initUsername() {
      const saved = localStorage.getItem('george-ai-username');
      if (saved) {
        setUsername(saved);
      } else {
        usernameOverlay.classList.remove('hidden');
        usernameInput.focus();
      }
    }
    function setUsername(name) {
      username = name;
      localStorage.setItem('george-ai-username', name);
      userData = loadUserData(name);
      document.getElementById('header-username').textContent = name;
      usernameOverlay.classList.add('hidden');
      input.focus();
    }
    document.getElementById('username-confirm').addEventListener('click', () => {
      const name = usernameInput.value.trim();
      if (!name) return;
      setUsername(name);
    });
    usernameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('username-confirm').click();
    });

    // ── Settings panel ──
    function populateModelDropdown(provider) {
      const sel = document.getElementById('settings-model');
      sel.innerHTML = '';
      MODELS[provider].forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        if (m === settings.model) opt.selected = true;
        sel.appendChild(opt);
      });
    }
    document.getElementById('settings-provider').addEventListener('change', function () {
      const p = this.value;
      settings.model = DEFAULT_MODELS[p];
      populateModelDropdown(p);
    });
    settingsBtn.addEventListener('click', () => {
      document.getElementById('settings-provider').value = settings.provider;
      document.getElementById('settings-apikey').value = settings.apiKey;
      document.getElementById('settings-fontsize').value = settings.fontSize || 'medium';
      document.getElementById('settings-theme').value = settings.theme || 'dark';
      populateModelDropdown(settings.provider);
      settingsPanel.classList.add('open');
    });
    document.getElementById('settings-save').addEventListener('click', () => {
      settings.provider = document.getElementById('settings-provider').value;
      settings.apiKey = document.getElementById('settings-apikey').value.trim();
      settings.model = document.getElementById('settings-model').value;
      settings.fontSize = document.getElementById('settings-fontsize').value;
      settings.theme = document.getElementById('settings-theme').value;
      saveSettings();
      applySettings(settings);
      settingsPanel.classList.remove('open');
    });
    document.getElementById('settings-close').addEventListener('click', () => {
      settingsPanel.classList.remove('open');
    });

    // ── Image paste ──
    document.addEventListener('paste', e => {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          const reader = new FileReader();
          reader.onload = ev => {
            const dataUrl = ev.target.result;
            const [header, data] = dataUrl.split(',');
            const mediaType = header.match(/:(.*?);/)[1];
            pastedImage = { data, mediaType, previewUrl: dataUrl };
            imagePreview.src = dataUrl;
            imagePreviewWrap.style.display = 'flex';
          };
          reader.readAsDataURL(file);
          break;
        }
      }
    });
    document.getElementById('clear-image').addEventListener('click', () => {
      pastedImage = null;
      imagePreview.src = '';
      imagePreviewWrap.style.display = 'none';
    });

    // ── Chat UI ──
    function addMessage(role, text, imgSrc) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.style.fontSize = FONT_SIZES[settings.fontSize] || '15px';
      if (imgSrc) {
        const img = document.createElement('img');
        img.src = imgSrc;
        div.appendChild(img);
      }
      if (text) div.appendChild(document.createTextNode(text));
      chat.appendChild(div);
      div.scrollIntoView({ behavior: 'instant', block: 'end' });
      return div;
    }

    // ── Send message ──
    async function sendMessage() {
      const message = input.value.trim();
      if (!message && !pastedImage) return;

      input.value = '';
      sendBtn.disabled = true;
      addMessage('user', message, pastedImage ? pastedImage.previewUrl : null);

      const imagePayload = pastedImage ? { data: pastedImage.data, mediaType: pastedImage.mediaType } : null;
      pastedImage = null;
      imagePreview.src = '';
      imagePreviewWrap.style.display = 'none';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            image: imagePayload,
            history: userData.currentSession,
            provider: settings.provider,
            apiKey: settings.apiKey || undefined,
            model: settings.model,
            summary: userData.summary || undefined,
          }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');

        addMessage('assistant', data.reply);

        userData.currentSession.push({ role: 'user', content: message || '[image]' });
        userData.currentSession.push({ role: 'assistant', content: data.reply });
        saveUserData();

        sessionHasMessages = true;
        endSessionBtn.disabled = false;
      } catch (err) {
        addMessage('error', 'Error: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── End Session ──
    endSessionBtn.addEventListener('click', async () => {
      if (!sessionHasMessages) return;
      endSessionBtn.disabled = true;
      endSessionBtn.textContent = 'Saving...';

      try {
        const res = await fetch('/summarize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            currentSession: userData.currentSession,
            existingSummary: userData.summary || undefined,
            provider: settings.provider,
            apiKey: settings.apiKey || undefined,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Summarize failed');

        userData.summary = data.summary;
        userData.currentSession = [];
        saveUserData();

        chat.innerHTML = '';
        sessionHasMessages = false;
        endSessionBtn.textContent = 'End Session';
        input.focus();
      } catch (err) {
        addMessage('error', 'Could not save session: ' + err.message);
        endSessionBtn.disabled = false;
        endSessionBtn.textContent = 'End Session';
      }
    });

    // ── Init ──
    settings = loadSettings();
    applySettings(settings);
    initUsername();
  </script>
</body>
</html>
